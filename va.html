  <p>My project is someone doing a backhand spring on the beam. The community I chose was my gym and I think it shows in my project a lot of  people are watching you and if you make a mistake so many people will see/notice. Unity and harmony plays a big part in showing the message in contemporary art because the shapes and colors express a lot and it helps you understand the project better. I feel like art has changed so much over the years especially from like hundreds of years ago. Comparing for example the mona lisa to pop art it looks so different. I think now there are a lot more styles of art compared to before where i feel like most were realistic.
</p>
<p>This artwork shows a hand coming out of the ground. The hand is holding a pencil while ribbons tie it, trying to bring it back down. The pencil represents me in the art community, the hand represents me and the ribbon represents me holding myself back.</p>
